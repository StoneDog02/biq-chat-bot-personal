<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BODYiQ widget — local preview</title>
    <!-- The compiled widget stylesheet (served from /public by `next dev`). -->
    <link rel="stylesheet" href="/widget.css" />
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background: #fafafa;
        color: #1a1a1a;
      }
      .wrap {
        max-width: 480px;
        margin: 40px auto;
        padding: 0 16px;
      }
      .note {
        background: #fff7ed;
        border: 1px solid #fed7aa;
        color: #7c2d12;
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 13px;
        line-height: 1.5;
        margin-bottom: 20px;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 16px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>BODYiQ assistant — local preview</h1>
      <div class="note">
        Dev preview only. The widget renders and is interactive, but sending a
        message needs <code>ANTHROPIC_API_KEY</code> + <code>VOYAGE_API_KEY</code>
        set in <code>.env.local</code> — until then you'll get a friendly error
        bubble. That's expected.
      </div>

      <!-- The widget mounts INLINE into this container. -->
      <div id="bodyiq-assistant"></div>
    </div>

    <!-- The compiled widget bundle exposes window.BODYiQAssistant. -->
    <script src="/widget.js"></script>
    <script>
      window.BODYiQAssistant.init({
        target: "#bodyiq-assistant",
        // Same-origin as the dev server, so no CORS needed for the preview.
        apiUrl: window.location.origin + "/api/chat",
        // Pretend we're on a product page so retrieval bias would kick in.
        pageContext: { type: "product", handle: "sample-product" },
        quickReplies: [
          "Is this right for me?",
          "How do I take it?",
          "What's in it?",
        ],
        title: "Ask BODYiQ",
        humanHandoffUrl: "#",
      });
    </script>
  </body>
</html>
